#cloud-config
package_update: true
package_upgrade: true
packages:
  - qemu-kvm
  - libvirt-daemon-system
  - libvirt-clients
  - bridge-utils
  - virtinst
  - curl
  - wget
  - git
  - htop
  - net-tools
runcmd:
  - systemctl enable --now libvirtd
  - usermod -aG libvirt root
  - echo "net.ipv4.ip_forward = 1" >> /etc/sysctl.conf
  - sysctl -p
